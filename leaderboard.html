<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>THANKS — Super leaderboard prototype</title>
<style>
@font-face{font-family:'Gramatika';src:url('./leaderboard/Gramatika-Regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'Gramatika';src:url('./leaderboard/Gramatika-Bold.woff2') format('woff2');font-weight:700;font-style:normal;font-display:swap;}
@font-face{font-family:'Gramatika';src:url('./leaderboard/Gramatika-Black.woff2') format('woff2');font-weight:900;font-style:normal;font-display:swap;}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{min-height:100%;display:flex;align-items:center;justify-content:center;padding:40px 16px;background:#f4f4f5;
  font-family:'Gramatika',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;}

.lb-root{width:100%;max-width:970px;}
.lb-fitwrap{position:relative;width:100%;overflow:hidden;}
.lb-fit{position:absolute;top:0;left:50%;width:970px;height:250px;transform-origin:top center;}
.lb-unit{display:flex;align-items:stretch;gap:8px;width:970px;height:250px;user-select:none;}

/* scrolling viewport */
.lb-stage{position:relative;flex:0 0 954px;width:954px;height:250px;overflow:hidden;border-radius:24px;contain:paint;transform:translateZ(0);cursor:pointer;
  --lb-ink:#562501;--lb-accent:#ffa442;}
.lb-track{display:flex;flex-direction:column;will-change:transform;transition:transform .55s cubic-bezier(.45,.02,.18,1);}
.lb-track.lb-noanim{transition:none;}
.lb-body{position:relative;flex:0 0 250px;width:954px;height:250px;overflow:hidden;}

/* graphic frame: layered cards that animate independently.
   Geometry lifted verbatim from Figma ("Image for export", 195x228 at 14,11):
   each wrapper places a card by its own top-left origin with the design's CCW rotation;
   the inner .lb-card carries hover animation (origin bottom-left) so placement and
   animation never fight. */
.lb-graphic{position:absolute;left:14px;top:11px;width:195px;height:228px;z-index:1;perspective:820px;}
.lb-cards{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .4s cubic-bezier(.2,0,0,1);will-change:transform;}
.lb-cw{position:absolute;top:0;left:0;transform-origin:0 0;transform-style:preserve-3d;}
.lb-cw1{width:90px;height:117px;transform:translate3d(22px,86px,0) rotate(-22.3deg);z-index:1;}
.lb-cw2{width:90px;height:126px;transform:translate3d(31px,72px,9px) rotate(-17.3deg);z-index:2;}
.lb-cw3{width:90px;height:134px;transform:translate3d(43px,59px,18px) rotate(-12.3deg);z-index:3;}
.lb-cw4{width:97px;height:140px;transform:translate3d(58px,47px,28px) rotate(-7.3deg);z-index:4;}
.lb-card{position:absolute;inset:0;border-radius:14px;transform-origin:0% 100%;
  box-shadow:0 8px 16px rgba(0,0,0,.18),0 2px 4px rgba(0,0,0,.12);
  transition:transform .4s cubic-bezier(.2,0,0,1);will-change:transform;backface-visibility:hidden;}
.lb-cw4 .lb-card{border-radius:15px;overflow:hidden;background-color:#ff8808;background-size:auto 103%;background-position:center;}/* 103% overdraws so no card-colour hairline shows at the edges */
/* hover: scale up slightly + fan out subtly (origin bottom-left), whole set also leans right a touch */
.lb-graphic{transition:transform .4s cubic-bezier(.2,0,0,1);}
@media (hover:hover){
  .lb-offer .lb-graphic:hover{transform:rotate(1.5deg);}
  .lb-graphic:hover .lb-cw1 .lb-card{transform:rotate(-4.5deg) scale(1.05);}
  .lb-graphic:hover .lb-cw2 .lb-card{transform:rotate(-2.5deg) scale(1.05);}
  .lb-graphic:hover .lb-cw3 .lb-card{transform:rotate(-0.5deg) scale(1.05);}
  .lb-graphic:hover .lb-cw4 .lb-card{transform:rotate(1deg) scale(1.05);}
}
.lb-logo{position:absolute;left:26px;top:50%;transform:translateY(-50%);width:100px;height:100px;border-radius:50%;display:block;z-index:1;
  transition:transform .35s cubic-bezier(.2,0,0,1);}/* graphic starts at x:14, so 26 = design x:40 */
@media (hover:hover){.lb-logo:hover{transform:translateY(-50%) scale(1.06) rotate(3deg);}}

/* content = text + CTA in a flex row so the button's flexible width never overlaps the text */
.lb-content{position:absolute;top:0;bottom:0;right:40px;display:flex;align-items:center;gap:28px;z-index:2;}
.lb-offer .lb-content{left:222px;}
.lb-splash .lb-content{left:160px;}
.lb-text{flex:1 1 auto;min-width:0;}
.lb-heading{margin:0;font-weight:900;letter-spacing:-.02em;text-wrap:balance;}
.lb-offer .lb-heading{font-size:28px;line-height:1.08;}
.lb-splash .lb-heading{font-size:34px;line-height:1.05;}
.lb-body-txt{margin:11px 0 0;font-weight:400;text-wrap:pretty;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;}
.lb-offer .lb-body-txt{font-size:15px;line-height:1.4;}
.lb-splash .lb-body-txt{font-size:17px;line-height:1.4;}

/* CTA button */
.lb-btn{flex:0 0 auto;height:48px;padding:0 22px;border:none;border-radius:120px;font-family:inherit;font-weight:700;font-size:18px;line-height:1;white-space:nowrap;cursor:pointer;
  transition:transform .15s ease,filter .15s ease;}
@media (hover:hover){.lb-btn:hover{transform:scale(1.02);filter:brightness(1.08);}}
.lb-btn:active{transform:scale(.96);}

/* terms (bottom-left, scrolls with the spot) */
.lb-terms{position:absolute;left:15px;bottom:12px;font-size:11px;line-height:1;font-weight:400;pointer-events:none;mix-blend-mode:multiply;opacity:.85;z-index:2;}

/* prev / next arrows — SHARED overlay, fixed on the stage; colours animate between spots */
.lb-arrows{position:absolute;right:12px;bottom:12px;display:flex;gap:6px;z-index:6;}
.lb-arrow{position:relative;width:32px;height:32px;border:none;border-radius:100px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  background:var(--lb-ink);color:var(--lb-accent);
  transition:background-color .55s ease,color .55s ease,transform .15s ease,opacity .25s ease,filter .15s ease;}
.lb-arrow svg{width:16px;height:16px;display:block;}
.lb-arrow::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:38px;height:40px;}
@media (hover:hover){.lb-arrow:not([disabled]):hover{transform:scale(1.06);filter:brightness(1.08);}}
.lb-arrow:not([disabled]):active{transform:scale(.94);}
.lb-arrow[disabled]{opacity:.4;pointer-events:none;cursor:default;}

/* pagination (right, on the page bg) */
.lb-pag{flex:0 0 8px;width:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.lb-dot{position:relative;width:7px;height:7px;border-radius:100px;background:#d4d4d4;cursor:pointer;padding:0;border:none;
  transition:background-color .3s ease,transform .3s ease;}
.lb-dot::before{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:22px;height:14px;}
.lb-dot.on{background:#171717;}
.lb-dot:focus-visible,.lb-arrow:focus-visible,.lb-btn:focus-visible,.lb-stage:focus-visible{outline:2px solid #2f6fd8;outline-offset:2px;}

/* one-time staggered entrance for the first spot (containers only — leaves card transforms intact) */
@keyframes lb-rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.lb-intro .lb-graphic,.lb-intro .lb-content{animation:lb-rise .5s cubic-bezier(.2,0,0,1) both;}
.lb-intro .lb-content{animation-delay:120ms;}

@media (prefers-reduced-motion:reduce){
  .lb-track,.lb-card,.lb-cards,.lb-arrow,.lb-dot,.lb-btn,.lb-graphic,.lb-logo{transition:none;}
  .lb-graphic:hover .lb-cw1 .lb-card,.lb-graphic:hover .lb-cw2 .lb-card,
  .lb-graphic:hover .lb-cw3 .lb-card,.lb-graphic:hover .lb-cw4 .lb-card{transform:none;}
  .lb-offer .lb-graphic:hover{transform:none;}
  .lb-logo:hover{transform:translateY(-50%);}
  .lb-intro .lb-graphic,.lb-intro .lb-content{animation:none;}
}
</style>
</head>
<body>
<div id="lb-root" class="lb-root">
  <div class="lb-fitwrap" id="lb-fitwrap">
    <div class="lb-fit" id="lb-fit">
      <div class="lb-unit">
        <div class="lb-stage" id="lb-stage" role="group" aria-roledescription="carousel" aria-label="THANKS offers" tabindex="0">
          <div class="lb-track" id="lb-track"></div>
          <div class="lb-arrows" id="lb-arrows">
            <button class="lb-arrow lb-prev" type="button" aria-label="Previous offer"><svg viewBox="0 0 20 20" aria-hidden="true"><path d="M5 12.5l5-5 5 5" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            <button class="lb-arrow lb-next" type="button" aria-label="Next offer"><svg viewBox="0 0 20 20" aria-hidden="true"><path d="M5 7.5l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          </div>
        </div>
        <div class="lb-pag" id="lb-pag" role="tablist" aria-label="Choose offer"></div>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
  var BASE='./leaderboard/';
  var SPOTS=[
    {key:'splash',splash:true,bg:'#ff8808',logo:'logo.png',
      heading:'Your order includes 5 offers',body:'$350 cashback, win a cruise to Japan and more',
      ink:'#562501',btnBg:'#562501',btnColor:'#ffa442',btn:'Claim your rewards'},
    {key:'cruise',bg:'#45ccd5',photo:'photo-cruise.png',cards:['#ff78b8','#ff8808','#9e8bff'],
      heading:'Enter to win a cruise for 2 to Japan!',body:'For a limited time only, save 10% on Disney+ gift cards. With a range of card values available',
      ink:'#05383c',btnBg:'#05383c',btnColor:'#70f5fe',btn:'Subscribe to enter'},
    {key:'chime',bg:'#4de160',photo:'photo-chime.png',cards:['#e3f13b','#9e8bff','#ff8808'],
      heading:'Join Chime in 2 mins and earn up to $350*',body:'Meet the most loved banking app. Get up to $350 with a new Chime Checking Account. No Credit Check. No Monthly Fees. Open an account in 2 minutes.*',
      ink:'#04400b',btnBg:'#04400b',btnColor:'#74ff86',btn:'Claim now'},
    {key:'disney',bg:'#e3f13b',photo:'photo-disney.png',cards:['#ff78b8','#ff8808','#9e8bff'],
      heading:'Get 10% off your Disney+ Gift Card',body:'For a limited time only, save 10% on Disney+ gift cards. With a range of card values available',
      ink:'#363a01',btnBg:'#363a01',btnColor:'#f4ff6b',btn:'Get it now'},
    {key:'gist',bg:'#ff78b8',photo:'photo-gist.png',cards:['#e3f13b','#45ccd5','#9e8bff'],
      heading:'Up to a $250 bonus toward travel + no annual fee',body:'Subscribe to The GIST newsletter for your chance to win. Get the latest sports headlines and stories in just 5 minutes—all for free. Loved by 1M fans!*',
      ink:'#40021f',btnBg:'#40021f',btnColor:'#ff9bca',btn:'Subscribe to enter'},
    {key:'hellofresh',bg:'#9e8bff',photo:'photo-hellofresh.png',cards:['#ff78b8','#e3f13b','#4de160'],
      heading:'You’ve earned 30 FREE HelloFresh meals',body:'Enjoy the convenience of farm-fresh produce & protein to your door. The ultimate dinner hack thats quicker & cheaper than takeout!*',
      ink:'#0a003e',btnBg:'#0a003e',btnColor:'#c9beff',btn:'Complete survey'}
  ];
  var N=SPOTS.length, H=250;
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}

  function graphicHTML(s){
    if(s.logo) return '<div class="lb-graphic"><img class="lb-logo" src="'+BASE+s.logo+'" alt=""></div>';
    return '<div class="lb-graphic"><div class="lb-cards">'
      +'<div class="lb-cw lb-cw1"><div class="lb-card" style="background:'+s.cards[0]+'"></div></div>'
      +'<div class="lb-cw lb-cw2"><div class="lb-card" style="background:'+s.cards[1]+'"></div></div>'
      +'<div class="lb-cw lb-cw3"><div class="lb-card" style="background:'+s.cards[2]+'"></div></div>'
      +'<div class="lb-cw lb-cw4"><div class="lb-card" style="background-image:url('+BASE+s.photo+')"></div></div>'
      +'</div></div>';
  }
  function bodyHTML(s){
    return '<div class="lb-body '+(s.splash?'lb-splash':'lb-offer')+'" style="background:'+s.bg+';color:'+s.ink+'">'
      + graphicHTML(s)
      + '<div class="lb-content"><div class="lb-text"><h3 class="lb-heading">'+esc(s.heading)+'</h3><p class="lb-body-txt">'+esc(s.body)+'</p></div>'
      + '<button class="lb-btn" type="button" style="background:'+s.btnBg+';color:'+s.btnColor+'">'+esc(s.btn)+'</button></div>'
      + '<div class="lb-terms">Terms apply · Sponsored</div>'
      + '</div>';
  }

  var track=document.getElementById('lb-track');
  track.innerHTML=SPOTS.map(bodyHTML).join('');
  var bodies=[].slice.call(track.children);
  if(bodies[0]) bodies[0].classList.add('lb-intro');

  // pagination
  var pag=document.getElementById('lb-pag'), dots=[];
  SPOTS.forEach(function(s,i){
    var d=document.createElement('button');
    d.className='lb-dot'; d.type='button'; d.setAttribute('role','tab'); d.setAttribute('aria-label','Offer '+(i+1)+' of '+N);
    d.addEventListener('click',function(){ goTo(i); });
    pag.appendChild(d); dots.push(d);
  });

  var stage=document.getElementById('lb-stage');
  var prevBtn=stage.querySelector('.lb-prev'), nextBtn=stage.querySelector('.lb-next');
  var pos=0, locked=false;

  function render(animate){
    track.classList.toggle('lb-noanim', !animate || reduce);
    track.style.transform='translateY('+(-pos*H)+'px)';
    dots.forEach(function(d,i){ d.classList.toggle('on',i===pos); d.setAttribute('aria-selected',i===pos?'true':'false'); });
    // shared arrows: animate colours to the current spot + update disabled states
    stage.style.setProperty('--lb-ink',SPOTS[pos].btnBg);
    stage.style.setProperty('--lb-accent',SPOTS[pos].btnColor);
    prevBtn.disabled=(pos===0);
    nextBtn.disabled=(pos===N-1);
  }
  function go(dir){ var np=Math.max(0,Math.min(N-1,pos+dir)); if(locked||np===pos)return; locked=true; pos=np; render(true); if(reduce)locked=false; }
  function goTo(i){ i=Math.max(0,Math.min(N-1,i)); if(locked||i===pos)return; locked=true; pos=i; render(true); if(reduce)locked=false; }
  track.addEventListener('transitionend',function(e){ if(e.target===track && e.propertyName==='transform') locked=false; });

  prevBtn.addEventListener('click',function(e){e.stopPropagation();go(-1);});
  nextBtn.addEventListener('click',function(e){e.stopPropagation();go(1);});

  // card group only: 3D tilt + subtle positional shift, driven by mouse anywhere on the banner
  var allCards=[].slice.call(track.querySelectorAll('.lb-cards'));
  if(allCards.length && !reduce){
    stage.addEventListener('mousemove',function(e){
      var r=stage.getBoundingClientRect();
      var mx=(e.clientX-r.left)/r.width-0.5, my=(e.clientY-r.top)/r.height-0.5;
      var t='translate('+(mx*8).toFixed(2)+'px,'+(my*6).toFixed(2)+'px) '
           +'rotateY('+(mx*15).toFixed(2)+'deg) rotateX('+(-my*15).toFixed(2)+'deg)';
      allCards.forEach(function(c){ c.style.transform=t; });
    });
    stage.addEventListener('mouseleave',function(){
      allCards.forEach(function(c){ c.style.transform=''; });
    });
  }

  // wheel over the unit -> page (bounded)
  var wheelLock=false;
  stage.addEventListener('wheel',function(e){
    if(Math.abs(e.deltaY)<Math.abs(e.deltaX)) return;
    e.preventDefault();
    if(wheelLock||locked||Math.abs(e.deltaY)<4) return;
    wheelLock=true; go(e.deltaY>0?1:-1); setTimeout(function(){wheelLock=false;},650);
  },{passive:false});

  // swipe up/down
  var ty=null,tx=null,sw=false;
  stage.addEventListener('touchstart',function(e){ty=e.touches[0].clientY;tx=e.touches[0].clientX;sw=false;},{passive:true});
  stage.addEventListener('touchmove',function(e){
    if(ty===null)return; var dy=e.touches[0].clientY-ty, dx=e.touches[0].clientX-tx;
    if(!sw&&Math.abs(dy)>24&&Math.abs(dy)>Math.abs(dx)){sw=true;go(dy<0?1:-1);}
    if(Math.abs(dy)>Math.abs(dx))e.preventDefault();
  },{passive:false});
  stage.addEventListener('touchend',function(){ty=null;tx=null;});

  stage.addEventListener('keydown',function(e){
    if(e.key==='ArrowDown'||e.key==='ArrowRight'){e.preventDefault();go(1);}
    else if(e.key==='ArrowUp'||e.key==='ArrowLeft'){e.preventDefault();go(-1);}
  });

  // responsive scale-to-fit (fixed 970-wide design)
  var fit=document.getElementById('lb-fit'), fitwrap=document.getElementById('lb-fitwrap');
  function resize(){ var avail=fitwrap.clientWidth||970; var s=Math.min(1,avail/970);
    fit.style.transform='translateX(-50%) scale('+s+')'; fitwrap.style.height=(250*s)+'px'; }
  window.addEventListener('resize',resize);

  render(false); resize();
})();
</script>
</body>
</html>
